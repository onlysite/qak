<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夸克解析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;padding:20px;font-family:sans-serif}
.main{max-width:420px;margin:0 auto;background:#fff;padding:24px;border-radius:12px}
h3{text-align:center;margin-bottom:16px}
input,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{background:#00bfff;color:#fff;border:none}
.item{padding:10px;margin:6px 0;background:#f9f9f9;border-radius:8px}
.download{color:#00bfff;text-decoration:none}
#tip{text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="main">
  <h3>私人夸克解析</h3>
  <input id="link" placeholder="粘贴夸克分享链接">
  <button onclick="parse()">解析</button>
  <div id="tip"></div>
  <div id="list"></div>
</div>

<script>
const API = "https://你的worker.workers.dev";

async function parse() {
  const link = document.getElementById("link").value.trim();
  const tip = document.getElementById("tip");
  const list = document.getElementById("list");
  
  tip.textContent = "解析中...";
  list.innerHTML = "";

  try {
    let res = await fetch(API + "?url=" + encodeURIComponent(link));
    let data = await res.json();
    let files = data.data;

    tip.textContent = `共 ${files.length} 个文件`;

    files.forEach(f => {
      let div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>${f.file_name}</div>
        <a href="${f.download_url}" download="${f.file_name}" class="download">下载</a>
      `;
      list.appendChild(div);
    });
  } catch(e) {
    tip.textContent = "解析失败";
  }
}
</script>
</body>
</html>
